name: playground-project-setup
steps:
  - id: assign_worktree
    block_id: assign_worktree
    params:
      use_sandbox: true
      cleanup_sandbox: false
      sandbox_prefix: playground-project-setup

  - id: prepare_context
    block_id: prepare_context

  - id: derive_test_targets
    block_id: derive_test_targets

  - id: resolve_test_runner
    block_id: resolve_test_runner

  - id: generate_red_tests
    block_id: opencode_prompt
    params:
      template_config_key: red_prompt_template
      output_key: response_text

  - id: verify_test_paths_red
    block_id: assert_test_files_exist
    params:
      source_step: derive_test_targets
      source_key: required_test_paths

  - id: assert_test_paths_red
    block_id: assert_command_status
    params:
      source_step: verify_test_paths_red
      expect_success: true

  - id: validate_red_phase
    block_id: summarize_text
    params:
      source_step: generate_red_tests
      source_key: response_text
      output_key: summary_text

  - id: run_red_tests
    block_id: execute_command
    params:
      command: "{{steps.resolve_test_runner.verify_command}}"

  - id: assert_red_tests
    block_id: assert_command_status
    params:
      source_step: run_red_tests
      expect_success: false

  - id: implement_until_green
    block_id: opencode_prompt
    params:
      template_config_key: implement_prompt_template
      output_key: response_text

  - id: run_green_tests
    block_id: execute_command
    params:
      command: "{{steps.resolve_test_runner.verify_command}}"

  - id: verify_test_paths_green
    block_id: assert_test_files_exist
    params:
      source_step: derive_test_targets
      source_key: required_test_paths

  - id: assert_test_paths_green
    block_id: assert_command_status
    params:
      source_step: verify_test_paths_green
      expect_success: true

  - id: assert_green_tests
    block_id: assert_command_status
    params:
      source_step: run_green_tests
      expect_success: true

  - id: finalize_run
    block_id: finalize_result
    params:
      worktree_step: assign_worktree
      primary_step: generate_red_tests
      primary_key: response_text
      summary_step: validate_red_phase
      summary_key: summary_text
      final_step: implement_until_green
      final_key: response_text
